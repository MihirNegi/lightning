<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightDemo</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      /* Native video element that plays behind the Blits canvas on the
         Player screen. Hidden until Player mounts. Sits at z-index 0 so
         the canvas (z-index 1) composites on top. When Player sets the
         canvas root Element to transparent, the video shows through. */
      #player-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        display: none;
        z-index: 0;
      }
      #app {
        position: absolute;
        inset: 0;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <video id="player-video" playsinline></video>
    <div id="app"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
